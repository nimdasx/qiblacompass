name: qiblacompass
description: "Aira Qibla Compass - Accurate Qibla direction finder."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_compass: ^0.8.1
  flutter_svg: ^2.2.4
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  logger: ^2.7.0
  permission_handler: ^12.0.1
  provider: ^6.1.5+1
  rxdart: ^0.28.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
